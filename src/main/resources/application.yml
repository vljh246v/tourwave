spring:
  application:
    name: tourwave
  profiles:
    default: local
  jpa:
    open-in-view: false

tourwave:
  app:
    base-url: ${TOURWAVE_APP_BASE_URL:http://localhost:3000}
  idempotency:
    ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:86400}
  auth:
    jwt-secret: ${TOURWAVE_JWT_SECRET:tourwave-dev-secret-key-change-me}
    access-token-ttl-seconds: ${TOURWAVE_ACCESS_TOKEN_TTL_SECONDS:3600}
    refresh-token-ttl-seconds: ${TOURWAVE_REFRESH_TOKEN_TTL_SECONDS:1209600}
    allow-header-auth-fallback: ${TOURWAVE_ALLOW_HEADER_AUTH_FALLBACK:false}
  payment:
    webhook-secret: ${TOURWAVE_PAYMENT_WEBHOOK_SECRET:tourwave-webhook-secret}
    webhook-secrets: ${TOURWAVE_PAYMENT_WEBHOOK_SECRETS:}
    refund:
      max-retry-attempts: ${TOURWAVE_PAYMENT_MAX_RETRY_ATTEMPTS:5}
      retry-cooldown-seconds: ${TOURWAVE_PAYMENT_RETRY_COOLDOWN_SECONDS:600}
  jobs:
    lock:
      owner-id: ${TOURWAVE_JOB_LOCK_OWNER_ID:}
      lease-seconds: ${TOURWAVE_JOB_LOCK_LEASE_SECONDS:120}
      stale-after-seconds: ${TOURWAVE_JOB_LOCK_STALE_AFTER_SECONDS:300}
  organization:
    invitation-token-ttl-seconds: ${TOURWAVE_ORG_INVITATION_TOKEN_TTL_SECONDS:604800}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
      show-details: always
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
