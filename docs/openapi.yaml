      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OperatorRemediationQueueItem'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /operator/operations/remediation-queue/{sourceType}/{sourceKey}:
    post:
      tags: [Operations]
      summary: Retry or resolve one remediation queue item
      parameters:
        - name: sourceType
          in: path
          required: true
          schema: { type: string, enum: [REFUND, NOTIFICATION_DELIVERY, PAYMENT_WEBHOOK] }
        - name: sourceKey
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperatorRemediationRequest'
      responses:
        '200':
          description: Queue item updated or resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorRemediationQueueItem'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OperatorRemediationRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [RETRY, RESOLVE]
        note:
          type: string

    OperatorRemediationQueueItem:
      type: object
      required:
        - sourceType
        - sourceKey
        - queueStatus
        - failureCategory
        - resourceType
        - detail
        - retryable
        - availableActions
        - sourceOccurredAtUtc
        - sourceUpdatedAtUtc
        - actionRetryCount
      properties:
        sourceType:
          type: string
          enum: [REFUND, NOTIFICATION_DELIVERY, PAYMENT_WEBHOOK]
        sourceKey:
          type: string
        queueStatus:
          type: string
          enum: [OPEN, RESOLVED]
        failureCategory:
          type: string
        resourceType:
          type: string
        resourceId:
          type: integer
          format: int64
          nullable: true
        detail:
          type: string
        retryable:
          type: boolean
        availableActions:
          type: array
          items:
            type: string
            enum: [RETRY, RESOLVE]
        sourceOccurredAtUtc:
          type: string
          format: date-time
        sourceUpdatedAtUtc:
          type: string
          format: date-time
        actionRetryCount:
          type: integer
        lastQueueAction:
          type: string
          nullable: true
        lastActionByUserId:
          type: integer
          format: int64
          nullable: true
        lastActionAtUtc:
          type: string
          format: date-time
          nullable: true
        lastActionNote:
          type: string
          nullable: true

    # -----------------------------
    # Tour
    # -----------------------------

    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: integer
          minimum: 0
          description: Minor unit (e.g., KRW)
        currency:
          type: string
          example: KRW

    TourStatus:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED]

    Tour:
      type: object
      required: [id, organizationId, status, title, categoryId, formatId, locationText, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        organizationId: { $ref: '#/components/schemas/Id64' }
        status: { $ref: '#/components/schemas/TourStatus' }
        title: { type: string, maxLength: 200 }
        subtitle: { type: string, nullable: true, maxLength: 200 }
        categoryId: { $ref: '#/components/schemas/Id64' }
        formatId: { $ref: '#/components/schemas/Id64' }
        locationText: { type: string, maxLength: 200 }
        coverImageUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    TourDetail:
      allOf:
        - $ref: '#/components/schemas/Tour'
        - type: object
          properties:
            instructors:
              type: array
              items: { $ref: '#/components/schemas/InstructorPublicProfile' }
            ratingSummary:
              $ref: '#/components/schemas/RatingSummary'

    TourCreateRequest:
      type: object
      required: [title, categoryId, formatId, locationText]
      properties:
        title: { type: string, maxLength: 200 }
        subtitle: { type: string, nullable: true, maxLength: 200 }
        categoryId: { $ref: '#/components/schemas/Id64' }
        formatId: { $ref: '#/components/schemas/Id64' }
        locationText: { type: string, maxLength: 200 }

    TourPatchRequest:
      type: object
      properties:
        title: { type: string, maxLength: 200 }
        subtitle: { type: string, nullable: true, maxLength: 200 }
        categoryId: { $ref: '#/components/schemas/Id64' }
        formatId: { $ref: '#/components/schemas/Id64' }
        locationText: { type: string, maxLength: 200 }

    TourListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Tour' }
        nextCursor: { type: string, nullable: true }

    PublicTourListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Tour' }
        nextCursor: { type: string, nullable: true }

    TourInstructorSetRequest:
      type: object
      required: [instructorProfileIds]
      properties:
        instructorProfileIds:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Id64' }

    # -----------------------------
    # Tour Rich Content (Text editor content)
    # -----------------------------

    TourContentResponse:
      type: object
      required: [tourId, contentJson, updatedAt]
      properties:
        tourId: { $ref: '#/components/schemas/Id64' }
        contentJson:
          type: object
          description: Editor JSON (e.g., TipTap/Slate/Quill delta)
          additionalProperties: true
        updatedAt: { type: string, format: date-time }

    TourContentUpsertRequest:
      type: object
      required: [contentJson]
      properties:
        contentJson:
          type: object
          additionalProperties: true

    # -----------------------------
    # Assets (generic) + Tour Assets
    # -----------------------------

    AssetStatus:
      type: string
      enum: [PENDING, READY, FAILED]

    Asset:
      type: object
      required: [id, status, mimeType, sizeBytes, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        status: { $ref: '#/components/schemas/AssetStatus' }
        mimeType: { type: string }
        sizeBytes: { type: integer, minimum: 0 }
        url: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    AssetUploadUrlRequest:
      type: object
      required: [fileName, mimeType, sizeBytes]
      properties:
        fileName: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer, minimum: 1 }

    AssetUploadUrlResponse:
      type: object
      required: [assetId, uploadUrl, method]
      properties:
        assetId: { $ref: '#/components/schemas/Id64' }
        uploadUrl: { type: string }
        method: { type: string, enum: [PUT, POST], default: PUT }
        headers:
          type: object
          additionalProperties: { type: string }
          nullable: true

    AssetCompleteRequest:
      type: object
      required: [assetId]
      properties:
        assetId: { $ref: '#/components/schemas/Id64' }

    AssetCompleteResponse:
      type: object
      required: [asset]
      properties:
        asset: { $ref: '#/components/schemas/Asset' }

    TourAssetType:
      type: string
      enum: [COVER, GALLERY]

    TourAsset:
      type: object
      required: [id, tourId, assetId, type, sortOrder, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        tourId: { $ref: '#/components/schemas/Id64' }
        assetId: { $ref: '#/components/schemas/Id64' }
        type: { $ref: '#/components/schemas/TourAssetType' }
        sortOrder: { type: integer, minimum: 0 }
        createdAt: { type: string, format: date-time }
        asset:
          $ref: '#/components/schemas/Asset'

    TourAssetCreateRequest:
      type: object
      required: [assetId, type]
      properties:
        assetId: { $ref: '#/components/schemas/Id64' }
        type: { $ref: '#/components/schemas/TourAssetType' }

    TourAssetReorderRequest:
      type: object
      required: [orderedTourAssetIds]
      properties:
        orderedTourAssetIds:
          type: array
          items: { $ref: '#/components/schemas/Id64' }

    # -----------------------------
    # Occurrence (TourOccurrence)
    # -----------------------------

    OccurrenceStatus:
      type: string
      enum: [SCHEDULED, CANCELED, FINISHED]

    TourOccurrence:
      type: object
      required: [id, tourId, organizationId, status, timezone, startAtUtc, endAtUtc, capacity, price, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        tourId: { $ref: '#/components/schemas/Id64' }
        organizationId: { $ref: '#/components/schemas/Id64' }
        status: { $ref: '#/components/schemas/OccurrenceStatus' }
        timezone:
          type: string
          example: Asia/Seoul
        startAtUtc: { type: string, format: date-time }
        endAtUtc: { type: string, format: date-time }
        capacity: { type: integer, minimum: 1, maximum: 500 }
        price: { $ref: '#/components/schemas/Money' }
        createdAt: { type: string, format: date-time }

    OccurrenceDetail:
      allOf:
        - $ref: '#/components/schemas/TourOccurrence'
        - type: object
          properties:
            tour:
              $ref: '#/components/schemas/Tour'
            ratingSummary:
              $ref: '#/components/schemas/RatingSummary'
            availability:
              $ref: '#/components/schemas/AvailabilityResponse'

    OccurrenceCreateRequest:
      type: object
      required: [timezone, startAtUtc, endAtUtc, capacity, price]
      properties:
        timezone: { type: string, example: Asia/Seoul }
        startAtUtc: { type: string, format: date-time }
        endAtUtc: { type: string, format: date-time }
        capacity: { type: integer, minimum: 1, maximum: 500 }
        price: { $ref: '#/components/schemas/Money' }

    OccurrencePatchRequest:
      type: object
      description: |
        MVP: price change is forbidden when any booking exists.
      properties:
        timezone: { type: string }
        startAtUtc: { type: string, format: date-time }
        endAtUtc: { type: string, format: date-time }
        capacity: { type: integer, minimum: 1, maximum: 500 }

    OccurrenceRescheduleRequest:
      type: object
      required: [timezone, startAtUtc, endAtUtc]
      properties:
        timezone: { type: string }
        startAtUtc: { type: string, format: date-time }
        endAtUtc: { type: string, format: date-time }
        reason: { type: string, nullable: true }

    OccurrenceNotifyRequest:
      type: object
      required: [title, body]
      properties:
        title: { type: string, maxLength: 200 }
        body: { type: string, maxLength: 2000 }

    OccurrenceListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/TourOccurrence' }

    # -----------------------------
    # Availability / Quote
    # -----------------------------

    AvailabilityResponse:
      type: object
      required: [partySize, capacity, confirmedCount, heldCount, available, canConfirm]
      properties:
        partySize: { type: integer, minimum: 1 }
        capacity: { type: integer, minimum: 1 }
        confirmedCount:
          type: integer
          minimum: 0
          description: Seats taken by CONFIRMED bookings (party sizes)
        heldCount:
          type: integer
          minimum: 0
          description: Seats temporarily held for waitlist offers (optional; 0 in MVP if not implemented)
        available:
          type: integer
          minimum: 0
          description: Remaining seats (capacity - confirmedCount - heldCount)
        canConfirm:
          type: boolean
          description: If true, a new booking for partySize can be confirmed immediately
        willWaitlist:
          type: boolean
          nullable: true
          description: If true, booking would be waitlisted

    QuoteResponse:
      type: object
      required: [partySize, unitPrice, totalPrice, currency, canConfirm, willWaitlist]
      properties:
        partySize: { type: integer, minimum: 1 }
        unitPrice: { type: integer, minimum: 0 }
        totalPrice: { type: integer, minimum: 0 }
        currency: { type: string, example: KRW }
        canConfirm: { type: boolean }
        willWaitlist: { type: boolean }

    # -----------------------------
    # Search
    # -----------------------------

    RatingSummary:
      type: object
      required: [avgRating, reviewCount]
      properties:
        avgRating:
          type: number
          format: float
          minimum: 0
          maximum: 5
        reviewCount:
          type: integer
          minimum: 0

    ReviewSummaryItem:
      type: object
      properties:
        count: { type: integer, minimum: 0, example: 12 }
        averageRating: { type: number, format: double, nullable: true, example: 4.5 }

    OccurrenceReviewSummaryResponse:
      type: object
      properties:
        occurrenceId: { $ref: '#/components/schemas/Id64' }
        tour: { $ref: '#/components/schemas/ReviewSummaryItem' }
        instructor: { $ref: '#/components/schemas/ReviewSummaryItem' }

    TourReviewSummaryResponse:
      type: object
      properties:
        tourId: { $ref: '#/components/schemas/Id64' }
        summary: { $ref: '#/components/schemas/ReviewSummaryItem' }
        aggregationMode: { type: string, example: QUERY_TIME }

    InstructorReviewSummaryResponse:
      type: object
      properties:
        instructorProfileId: { $ref: '#/components/schemas/Id64' }
        summary: { $ref: '#/components/schemas/ReviewSummaryItem' }
        aggregationMode: { type: string, example: QUERY_TIME }

    OrganizationReviewSummaryResponse:
      type: object
      properties:
        organizationId: { $ref: '#/components/schemas/Id64' }
        scope: { type: string, example: PUBLIC }
        tour: { $ref: '#/components/schemas/ReviewSummaryItem' }
        instructor: { $ref: '#/components/schemas/ReviewSummaryItem' }
        aggregationMode: { type: string, example: QUERY_TIME }

    OccurrenceSearchItem:
      type: object
      required: [occurrence, tour]
      properties:
        occurrence: { $ref: '#/components/schemas/TourOccurrence' }
        tour: { $ref: '#/components/schemas/Tour' }
        ratingSummary: { $ref: '#/components/schemas/RatingSummary' }

    OccurrenceSearchResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/OccurrenceSearchItem' }
        nextCursor: { type: string, nullable: true }

    # -----------------------------
    # Booking
    # -----------------------------

    BookingStatus:
      type: string
      enum:
        - REQUESTED
        - WAITLISTED
        - OFFERED
        - CONFIRMED
        - REJECTED
        - CANCELED
        - EXPIRED
        - COMPLETED

    PaymentStatus:
      type: string
      enum:
        - AUTHORIZED
        - PAID
        - REFUND_PENDING
        - REFUNDED

    AttendanceStatus:
      type: string
      enum: [UNKNOWN, ATTENDED, NO_SHOW]

    Booking:
      type: object
      required: [id, organizationId, occurrenceId, userId, partySize, status, paymentStatus, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        organizationId:
          $ref: '#/components/schemas/Id64'
          description: Denormalized for authz checks
        occurrenceId: { $ref: '#/components/schemas/Id64' }
        userId:
          $ref: '#/components/schemas/Id64'
          description: Organizer user id
        partySize: { type: integer, minimum: 1, maximum: 50 }
        status: { $ref: '#/components/schemas/BookingStatus' }
        paymentStatus: { $ref: '#/components/schemas/PaymentStatus' }
        currency: { type: string, example: KRW, nullable: true }
        amountPaid: { type: integer, nullable: true, description: "Minor unit. Virtual in MVP." }
        createdAt: { type: string, format: date-time }

    BookingDetail:
      allOf:
        - $ref: '#/components/schemas/Booking'
        - type: object
          properties:
            occurrence: { $ref: '#/components/schemas/TourOccurrence' }
            participants:
              type: array
              items: { $ref: '#/components/schemas/BookingParticipant' }
            cancellation:
              $ref: '#/components/schemas/BookingCancellationInfo'

    BookingCreateRequest:
      type: object
      required: [partySize]
      properties:
        partySize:
          type: integer
          minimum: 1
          maximum: 50
        noteToOperator:
          type: string
          nullable: true

    BookingPartySizeUpdateRequest:
      type: object
      required: [partySize]
      properties:
        partySize:
          type: integer
          minimum: 1
          maximum: 50
          description: Must be less than or equal to current party size

    AttendanceParticipant:
      type: object
      required: [participantId, attendanceStatus]
      properties:
        participantId: { $ref: '#/components/schemas/Id64' }
        attendanceStatus: { $ref: '#/components/schemas/AttendanceStatus' }

    AttendanceUpdateRequest:
      type: object
      required: [participants]
      properties:
        participants:
          type: array
          items: { $ref: '#/components/schemas/AttendanceParticipant' }
          minItems: 1

    OfferExtendRequest:
      type: object
      required: [expiresAtUtc]
      properties:
        expiresAtUtc:
          type: string
          format: date-time

    BookingExplainResponse:
      type: object
      required: [bookingId, status, canCancel, canAcceptOffer, canDeclineOffer]
      properties:
        bookingId: { $ref: '#/components/schemas/Id64' }
        status: { $ref: '#/components/schemas/BookingStatus' }
        canCancel: { type: boolean }
        canAcceptOffer: { type: boolean }
        canDeclineOffer: { type: boolean }
        message: { type: string, nullable: true }

    BookingCancellationInfo:
      type: object
      properties:
        policyId: { $ref: '#/components/schemas/Id64', nullable: true }
        refundable:
          type: boolean
          nullable: true
        refundAmount:
          type: integer
          nullable: true
        currency:
          type: string
          nullable: true
        canceledAt:
          type: string
          format: date-time
          nullable: true

    # -----------------------------
    # Waitlist
    # -----------------------------

    WaitlistStatus:
      type: string
      enum: [WAITING, OFFERED, ACCEPTED, DECLINED, EXPIRED, PROMOTED]

    WaitlistItem:
      type: object
      required: [id, occurrenceId, bookingId, userId, partySize, status, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        occurrenceId: { $ref: '#/components/schemas/Id64' }
        bookingId: { $ref: '#/components/schemas/Id64' }
        userId: { $ref: '#/components/schemas/Id64' }
        partySize: { type: integer, minimum: 1, maximum: 50 }
        status: { $ref: '#/components/schemas/WaitlistStatus' }
        offerExpiresAtUtc:
          type: string
          format: date-time
          nullable: true
          description: "When status=OFFERED, user must respond within 24h unless overridden by operator"
        createdAt: { type: string, format: date-time }

    WaitlistResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/WaitlistItem' }

    # -----------------------------
    # Participants (booking_participants)
    # -----------------------------

    ParticipantStatus:
      type: string
      enum: [INVITED, ACCEPTED, DECLINED, EXPIRED]

    BookingParticipant:
      type: object
      required: [id, bookingId, userId, status, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        bookingId: { $ref: '#/components/schemas/Id64' }
        userId:
          $ref: '#/components/schemas/Id64'
          nullable: true
          description: "If invite by email/phone without account, can be null in MVP"
        invitedEmail:
          type: string
          format: email
          nullable: true
        status: { $ref: '#/components/schemas/ParticipantStatus' }
        expiresAtUtc:
          type: string
          format: date-time
          nullable: true
          description: Invitation expiry (e.g., 48h), blocked within 6h before start
        createdAt: { type: string, format: date-time }

    ParticipantInviteRequest:
      type: object
      required: [invitedEmail]
      properties:
        invitedEmail: { type: string, format: email }
        message: { type: string, nullable: true }

    ParticipantListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/BookingParticipant' }

    # -----------------------------
    # Notes (operator internal)
    # -----------------------------

    OccurrenceNote:
      type: object
      required: [id, occurrenceId, authorUserId, body, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        occurrenceId: { $ref: '#/components/schemas/Id64' }
        authorUserId: { $ref: '#/components/schemas/Id64' }
        body: { type: string, maxLength: 5000 }
        createdAt: { type: string, format: date-time }

    OccurrenceNoteCreateRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, maxLength: 5000 }

    # -----------------------------
    # Inquiry (tour 상담 티켓)
    # -----------------------------

    InquiryStatus:
      type: string
      enum: [OPEN, CLOSED]

    Inquiry:
      type: object
      required: [id, organizationId, occurrenceId, bookingId, createdByUserId, status, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        organizationId: { $ref: '#/components/schemas/Id64' }
        occurrenceId: { $ref: '#/components/schemas/Id64' }
        bookingId: { $ref: '#/components/schemas/Id64' }
        createdByUserId: { $ref: '#/components/schemas/Id64' }
        subject: { type: string, maxLength: 200, nullable: true }
        status: { $ref: '#/components/schemas/InquiryStatus' }
        createdAt: { type: string, format: date-time }

    InquiryDetail:
      allOf:
        - $ref: '#/components/schemas/Inquiry'
        - type: object
          properties:
            lastMessageAt: { type: string, format: date-time, nullable: true }

    InquiryCreateRequest:
      type: object
      required: [bookingId, message]
      properties:
        bookingId: { $ref: '#/components/schemas/Id64' }
        subject: { type: string, maxLength: 200, nullable: true }
        message: { type: string, maxLength: 5000 }
        attachmentAssetIds:
          type: array
          items: { $ref: '#/components/schemas/Id64' }
          nullable: true

    InquiryMessage:
      type: object
      required: [id, inquiryId, senderUserId, body, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        inquiryId: { $ref: '#/components/schemas/Id64' }
        senderUserId: { $ref: '#/components/schemas/Id64' }
        body: { type: string, maxLength: 5000 }
        attachmentAssetIds:
          type: array
          items: { $ref: '#/components/schemas/Id64' }
          nullable: true
        createdAt: { type: string, format: date-time }

    InquiryMessageCreateRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, maxLength: 5000 }
        attachmentAssetIds:
          type: array
          items: { $ref: '#/components/schemas/Id64' }
          nullable: true

    InquiryMessageListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InquiryMessage' }
        nextCursor: { type: string, nullable: true }

    # -----------------------------
    # Reviews (content restricted)
    # -----------------------------

    ReviewType:
      type: string
      enum: [TOUR, INSTRUCTOR]

    Review:
      type: object
      required: [id, type, organizationId, occurrenceId, authorUserId, rating, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        type: { $ref: '#/components/schemas/ReviewType' }
        organizationId: { $ref: '#/components/schemas/Id64' }
        occurrenceId: { $ref: '#/components/schemas/Id64' }
        tourId: { $ref: '#/components/schemas/Id64', nullable: true }
        instructorProfileId: { $ref: '#/components/schemas/Id64', nullable: true }
        authorUserId: { $ref: '#/components/schemas/Id64' }
        rating:
          type: integer
          minimum: 1
          maximum: 5
        body:
          type: string
          nullable: true
          description: "Content is private; only authorized viewers can access"
        createdAt: { type: string, format: date-time }

    TourReviewCreateRequest:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        body: { type: string, nullable: true, maxLength: 5000 }

    InstructorReviewCreateRequest:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        body: { type: string, nullable: true, maxLength: 5000 }
        instructorProfileId:
          $ref: '#/components/schemas/Id64'
          nullable: true
          description: "If multiple instructors exist, choose one; otherwise server can infer"

    ReviewListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Review' }
        nextCursor: { type: string, nullable: true }

    # -----------------------------
    # Announcements
    # -----------------------------

    Announcement:
      type: object
      required: [id, organizationId, title, body, visibility, createdAt, updatedAt]
      properties:
        id: { $ref: '#/components/schemas/Id64' }
        organizationId: { $ref: '#/components/schemas/Id64' }
        title: { type: string, maxLength: 200 }
        body: { type: string, maxLength: 5000 }
        visibility:
          type: string
          enum: [DRAFT, PUBLIC, INTERNAL]
        publishStartsAtUtc: { type: string, format: date-time, nullable: true }
        publishEndsAtUtc: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

