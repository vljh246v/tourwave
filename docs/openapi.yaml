        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancellationPolicy'
# =========================
# 6) Inquiries + Reviews + Reports + Moderation
# Paste under: paths:
# =========================

  # ---------
  # Inquiries (Tour 상담 티켓: 동행자도 조회 가능)
  # ---------

  /occurrences/{occurrenceId}/inquiries:
    post:
      tags: [Inquiries]
      summary: Create tour inquiry ticket
      description: |
        Creates a "tour 상담 티켓".
        Request body must include `bookingId` linked to the caller.
        Visible to booking organizer + participants (once booking exists),
        and org operators (ORG_ADMIN/ORG_OWNER).
      parameters:
        - $ref: '#/components/parameters/occurrenceId'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InquiryCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Inquiry' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: Conflict (idempotency)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                idempotencyInProgress:
                  $ref: '#/components/examples/IdempotencyInProgressConflict'
        '422':
          description: Unprocessable Entity (booking scope / required fields / idempotency key mismatch)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                bookingScopeMismatch:
                  $ref: '#/components/examples/BookingScopeMismatch'
                requiredFieldMissing:
                  $ref: '#/components/examples/RequiredFieldMissingInquiryMessageBody'
                idempotencyKeyReusedDifferentPayload:
                  $ref: '#/components/examples/IdempotencyKeyReusedDifferentPayload'

  /inquiries/{inquiryId}:
    get:
      tags: [Inquiries]
      summary: Get inquiry ticket
      parameters:
        - $ref: '#/components/parameters/inquiryId'
      responses:
        '200':
          description: Inquiry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InquiryDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /inquiries/{inquiryId}/messages:
    get:
      tags: [Inquiries]
      summary: List inquiry messages
      parameters:
        - $ref: '#/components/parameters/inquiryId'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InquiryMessageListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    post:
      tags: [Inquiries]
      summary: Post inquiry message (with optional attachments)
      parameters:
        - $ref: '#/components/parameters/inquiryId'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InquiryMessageCreateRequest' }
      responses:
        '201':
          description: Posted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InquiryMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict (invalid inquiry state/idempotency)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalidStateTransition:
                  $ref: '#/components/examples/InvalidStateTransitionConflict'
                idempotencyInProgress:
                  $ref: '#/components/examples/IdempotencyInProgressConflict'
        '422':
          description: Unprocessable Entity (required fields / idempotency key mismatch / scope mismatch)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                requiredFieldMissing:
                  $ref: '#/components/examples/RequiredFieldMissingBookingId'
                bookingScopeMismatch:
                  $ref: '#/components/examples/BookingScopeMismatch'
                idempotencyKeyReusedDifferentPayload:
                  $ref: '#/components/examples/IdempotencyKeyReusedDifferentPayload'

  /inquiries/{inquiryId}/close:
    post:
      tags: [Inquiries]
      summary: Close inquiry ticket
      description: |
        Can be closed by:
        - requester side (organizer/participant)
        - org operator (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/inquiryId'
        - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '204': { description: Closed }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict (invalid inquiry state/idempotency)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalidStateTransition:
                  $ref: '#/components/examples/InvalidStateTransitionConflict'
                idempotencyInProgress:
                  $ref: '#/components/examples/IdempotencyInProgressConflict'
        '422':
          description: Unprocessable Entity (idempotency key mismatch / scope mismatch)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                bookingScopeMismatch:
                  $ref: '#/components/examples/BookingScopeMismatch'
                idempotencyKeyReusedDifferentPayload:
                  $ref: '#/components/examples/IdempotencyKeyReusedDifferentPayload'

  # ---------
  # Reviews (내용 비공개, 평점/건수만 공개)
  # - Tour review & Instructor review are separate
  # - 작성 가능 조건: ATTENDED
  # - booking_participants도 작성 가능
  # ---------

  /occurrences/{occurrenceId}/reviews/tour:
    post:
      tags: [Reviews]
      summary: Create tour review (ATTENDED only)
      parameters:
        - $ref: '#/components/parameters/occurrenceId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TourReviewCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /occurrences/{occurrenceId}/reviews/instructor:
    post:
      tags: [Reviews]
      summary: Create instructor review (ATTENDED only)
      parameters:
        - $ref: '#/components/parameters/occurrenceId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InstructorReviewCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /occurrences/{occurrenceId}/reviews/summary:
    get:
      tags: [Reviews]
      security: []
      summary: Occurrence review summary
      parameters:
        - $ref: '#/components/parameters/occurrenceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OccurrenceReviewSummaryResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /reviews/{reviewId}:
    get:
      tags: [Reviews]
      summary: Get review (restricted)
      description: |
        Review content is visible only to:
        - author
        - reviewed instructor (for instructor review)
        - org operators of the occurrence org
      parameters:
        - $ref: '#/components/parameters/reviewId'
      responses:
        '200':
          description: Review
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /organizations/{orgId}/reviews:
    get:
      tags: [Reviews]
      summary: List reviews for org (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/orgId'
        - $ref: '#/components/parameters/reviewType'
        - $ref: '#/components/parameters/reviewVisibility'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /instructors/{instructorProfileId}/reviews/summary:
    get:
      tags: [Reviews]
      security: []
      summary: Instructor review summary (public)
      description: Public summary only. Content is restricted.
      parameters:
        - name: instructorProfileId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstructorReviewSummaryResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /organizations/{orgId}/reviews/summary:
    get:
      tags: [Reviews]
      security: []
      summary: Organization review summary (public)
      parameters:
        - $ref: '#/components/parameters/orgId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationReviewSummaryResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /operator/organizations/{orgId}/reviews/summary:
    get:
      tags: [Reviews]
      summary: Organization review summary (operator)
      parameters:
        - $ref: '#/components/parameters/orgId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationReviewSummaryResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

