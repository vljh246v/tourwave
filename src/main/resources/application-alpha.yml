spring:
  config:
    activate:
      on-profile: alpha
  datasource:
    url: ${ALPHA_DB_URL}
    username: ${ALPHA_DB_USERNAME}
    password: ${ALPHA_DB_PASSWORD}

tourwave:
  environment: alpha
  runtime-mode: shared-alpha
  app:
    base-url: ${ALPHA_APP_BASE_URL}

integration:
  payment:
    base-url: ${ALPHA_PAYMENT_BASE_URL}
    api-key: ${ALPHA_PAYMENT_API_KEY}
  notification:
    base-url: ${ALPHA_NOTIFICATION_BASE_URL}
    api-key: ${ALPHA_NOTIFICATION_API_KEY}
    sender-email: ${ALPHA_NOTIFICATION_SENDER_EMAIL}
    sender-name: ${ALPHA_NOTIFICATION_SENDER_NAME:Tourwave}
  asset:
    base-url: ${ALPHA_ASSET_BASE_URL}
    public-base-url: ${ALPHA_ASSET_PUBLIC_BASE_URL}
    bucket: ${ALPHA_ASSET_BUCKET}
    access-key: ${ALPHA_ASSET_ACCESS_KEY}
    secret-key: ${ALPHA_ASSET_SECRET_KEY}
    presign-ttl-seconds: ${ALPHA_ASSET_PRESIGN_TTL_SECONDS:900}
