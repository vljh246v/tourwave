        - $ref: '#/components/parameters/dateFromOptional'
        - $ref: '#/components/parameters/dateToOptional'
        - name: tourId
          in: query
          schema: { $ref: '#/components/schemas/Id64' }
        - name: occurrenceId
          in: query
          schema: { $ref: '#/components/schemas/Id64' }
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OccurrenceReportResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /organizations/{orgId}/reports/occurrences/export:
    get:
      tags: [Reports]
      summary: Export occurrence ops report CSV (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/orgId'
        - $ref: '#/components/parameters/dateFromOptional'
        - $ref: '#/components/parameters/dateToOptional'
        - name: tourId
          in: query
          schema: { $ref: '#/components/schemas/Id64' }
        - name: occurrenceId
          in: query
          schema: { $ref: '#/components/schemas/Id64' }
      responses:
        '200':
          description: OK
          content:
            text/csv:
              schema:
                type: string
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /organizations/{orgId}/reports/bookings:
    get:
      tags: [Reports]
      summary: Booking report (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/orgId'
        - $ref: '#/components/parameters/dateFromOptional'
        - $ref: '#/components/parameters/dateToOptional'
        - name: tourId
          in: query
          schema: { $ref: '#/components/schemas/Id64' }
        - name: occurrenceId
          in: query
          schema: { $ref: '#/components/schemas/Id64' }
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BookingReportResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /organizations/{orgId}/reports/bookings/export:
    get:
      tags: [Reports]
      summary: Export booking report CSV (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/orgId'
        - $ref: '#/components/parameters/dateFromOptional'
        - $ref: '#/components/parameters/dateToOptional'
        - name: tourId
          in: query
          schema: { $ref: '#/components/schemas/Id64' }
        - name: occurrenceId
          in: query
          schema: { $ref: '#/components/schemas/Id64' }
      responses:
        '200':
          description: OK
          content:
            text/csv:
              schema:
                type: string
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /payments/webhooks/provider:
    post:
      tags: [Payments]
      security: []
      summary: Receive payment provider webhook
      description: Target contract for provider event intake with signature validation and replay-safe handling.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [providerName, providerEventId, eventType]
              properties:
                providerName: { type: string }
                providerEventId: { type: string }
                eventType: { type: string }
                bookingId: { type: integer, format: int64 }
      responses:
        '202': { description: Accepted }
        '200': { description: Duplicate but already processed }
        '401': { $ref: '#/components/responses/Unauthorized' }

