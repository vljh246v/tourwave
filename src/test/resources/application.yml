spring:
  profiles:
    default: local

tourwave:
  app:
    base-url: http://localhost:3000
  idempotency:
    ttl-seconds: 86400
  auth:
    jwt-secret: tourwave-test-secret
    access-token-ttl-seconds: 3600
    refresh-token-ttl-seconds: 1209600
    allow-header-auth-fallback: true
  payment:
    webhook-secret: tourwave-webhook-secret
    webhook-secrets: current:tourwave-webhook-secret,previous:tourwave-webhook-secret-previous
    refund:
      max-retry-attempts: 5
      retry-cooldown-seconds: 600
  jobs:
    lock:
      owner-id:
      lease-seconds: 120
      stale-after-seconds: 300
  organization:
    invitation-token-ttl-seconds: 604800
  timewindow:
    invitation-window-minutes: 360
    invitation-expiry-hours: 48
    refund-full-window-hours: 48
    offer-window-seconds: 86400

integration:
  payment:
    base-url: http://localhost:18080/mock-payment
    api-key: test-payment-key
    provider-name: stub-pay
  notification:
    base-url: http://localhost:18081/mock-notification
    api-key:
    sender-email: no-reply@tourwave.test
    sender-name: Tourwave Test
  asset:
    base-url: http://localhost:18082/mock-asset
    public-base-url: http://localhost:18082/mock-asset/public
    bucket: tourwave-test
    access-key: test-access
    secret-key: test-secret
    presign-ttl-seconds: 900

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
      show-details: always
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: tourwave
