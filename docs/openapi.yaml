                invalidOccurrenceState:
                  $ref: '#/components/examples/InvalidStateTransitionConflict'
                idempotencyInProgress:
                  $ref: '#/components/examples/IdempotencyInProgressConflict'
        '422':
          description: Unprocessable Entity (idempotency key mismatch)
          content:
            application/json:
