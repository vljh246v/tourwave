spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${LOCAL_DB_URL:jdbc:mysql://localhost:3306/tourwave_local}
    username: ${LOCAL_DB_USERNAME:}
    password: ${LOCAL_DB_PASSWORD:}

tourwave:
  environment: local
  runtime-mode: local-system
  app:
    base-url: ${LOCAL_APP_BASE_URL:http://localhost:3000}
  auth:
    allow-header-auth-fallback: true

integration:
  payment:
    base-url: ${LOCAL_PAYMENT_BASE_URL:http://localhost:18080/mock-payment}
    api-key: ${LOCAL_PAYMENT_API_KEY:}
    provider-name: ${LOCAL_PAYMENT_PROVIDER_NAME:stub-pay}
  notification:
    base-url: ${LOCAL_NOTIFICATION_BASE_URL:http://localhost:18081/mock-notification}
    api-key: ${LOCAL_NOTIFICATION_API_KEY:}
    sender-email: ${LOCAL_NOTIFICATION_SENDER_EMAIL:no-reply@tourwave.local}
    sender-name: ${LOCAL_NOTIFICATION_SENDER_NAME:Tourwave Local}
  asset:
    base-url: ${LOCAL_ASSET_BASE_URL:http://localhost:18082/mock-asset}
    public-base-url: ${LOCAL_ASSET_PUBLIC_BASE_URL:http://localhost:18082/mock-asset/public}
    bucket: ${LOCAL_ASSET_BUCKET:tourwave-local}
    access-key: ${LOCAL_ASSET_ACCESS_KEY:local-access}
    secret-key: ${LOCAL_ASSET_SECRET_KEY:local-secret}
    presign-ttl-seconds: ${LOCAL_ASSET_PRESIGN_TTL_SECONDS:900}
