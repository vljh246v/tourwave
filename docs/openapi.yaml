openapi: 3.0.3
info:
  title: Tour Booking Platform API (MVP)
  version: 0.1.0
  description: |
    REST API target contract for the Tour Booking Platform MVP.
    Current implementation status and known drift are tracked in `docs/architecture.md`.
    As of 2026-03-19, this file reflects the current target contract after Sprint 19 review aggregation closure
    and excludes moderation APIs by policy decision.
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []

# =========================
# 1) Auth + Me + Notifications
# Paste under: paths:
# =========================
paths:
# =========================
# Assets read/delete endpoints (Paste under: paths:)
# =========================

  /assets/{assetId}:
    get:
      tags: [Assets]
      summary: Get asset
      description: |
        Returns asset metadata and (if READY) URL.
        Auth required. Access limited to asset owner (and optionally org operators if linked).
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Asset
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Asset' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [Assets]
      summary: Delete asset (soft)
      description: |
        Soft-delete asset. If already attached to tour/inquiry, server may forbid (409) or detach first.
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
# =========================
# Assets upload endpoints (Paste under: paths:)
# =========================

  /assets/upload-url:
    post:
      tags: [Assets]
      summary: Create signed upload URL
      description: |
        Step 1) Request upload URL (server creates Asset in PENDING).
        Client uploads file to storage using returned uploadUrl.
        Step 2) Call /assets/complete to finalize.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssetUploadUrlRequest' }
      responses:
        '201':
          description: Upload URL created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssetUploadUrlResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /assets/complete:
    post:
      tags: [Assets]
      summary: Complete upload (finalize asset)
      description: |
        Marks asset READY if upload is valid.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssetCompleteRequest' }
      responses:
        '200':
          description: Completed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssetCompleteResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /auth/signup:
    post:
      tags: [Auth]
      security: []
      summary: Sign up
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignupRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /auth/password/reset-request:
    post:
      tags: [Auth]
      security: []
      summary: Request password reset email
      description: |
        Always returns 204 to avoid user enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordResetRequest' }
      responses:
        '204': { description: Sent if account exists }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /auth/password/reset-confirm:
    post:
      tags: [Auth]
      security: []
      summary: Confirm password reset
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordResetConfirmRequest' }
      responses:
        '204': { description: Reset successful }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /auth/email/verify-request:
    post:
      tags: [Auth]
      summary: Request email verification
      responses:
        '204': { description: Sent }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/email/verify-confirm:
    post:
      tags: [Auth]
      security: []
      summary: Confirm email verification
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailVerifyConfirmRequest' }
      responses:
        '204': { description: Verified }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /me:
    get:
      tags: [Me]
      summary: Get current user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Me]
      summary: Update current user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MeUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /me/deactivate:
    post:
      tags: [Me]
      summary: Deactivate account (soft)
      responses:
        '204': { description: Deactivated }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/delete:
    post:
      tags: [Me]
      summary: Delete account (soft delete)
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/bookings:
    get:
      tags: [Bookings]
      summary: List my bookings
      parameters:
        - $ref: '#/components/parameters/bookingStatus'
        - $ref: '#/components/parameters/dateFromOptional'
        - $ref: '#/components/parameters/dateToOptional'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BookingListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/inquiries:
    get:
      tags: [Inquiries]
      summary: List my inquiries
      parameters:
        - $ref: '#/components/parameters/inquiryStatus'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InquiryListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/favorites:
    get:
      tags: [Favorites]
      summary: List my favorite tours
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FavoriteListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/notifications:
    get:
      tags: [Notifications]
      summary: List my notifications
      parameters:
        - $ref: '#/components/parameters/onlyUnread'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/notifications/{notificationId}/read:
    post:
      tags: [Notifications]
      summary: Mark notification read
      parameters:
        - $ref: '#/components/parameters/notificationId'
      responses:
        '204': { description: Read }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications read
      responses:
        '204': { description: Read all }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /organizations:
    post:
      tags: [Organizations]
      summary: Create organization
      description: Creator becomes ORG_OWNER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /organizations/{orgId}:
    get:
      tags: [Organizations]
      security: []
      summary: Get organization
      parameters:
        - $ref: '#/components/parameters/orgId'
      responses:
        '200':
          description: Organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{orgId}/members:
    get:
      tags: [Organizations]
      summary: List organization members
      parameters:
        - $ref: '#/components/parameters/orgId'
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMemberList'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Organizations]
      summary: Add organization member
      parameters:
        - $ref: '#/components/parameters/orgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMemberUpsertRequest'
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMember'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{orgId}/members/{userId}:
    patch:
      tags: [Organizations]
      summary: Update organization member
      parameters:
        - $ref: '#/components/parameters/orgId'
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMemberPatchRequest'
      responses:
        '200':
          description: Member updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMember'
        '403':
          $ref: '#/components/responses/Forbidden'

  /organizations/{orgId}/members/{userId}/remove:
    post:
      tags: [Organizations]
      summary: Remove organization member
      parameters:
        - $ref: '#/components/parameters/orgId'
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: Removed
        '403':
          $ref: '#/components/responses/Forbidden'

  /instructor-registrations:
    post:
      tags: [Instructors]
      summary: Request instructor registration
      description: User applies to become instructor in an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstructorRegistrationCreateRequest'
      responses:
        '201':
          description: Registration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructorRegistration'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /organizations/{orgId}/instructor-registrations:
    get:
      tags: [Instructors]
      summary: List instructor registrations
      parameters:
        - $ref: '#/components/parameters/orgId'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Registration list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructorRegistrationList'

  /instructor-registrations/{registrationId}/approve:
    post:
      tags: [Instructors]
      summary: Approve instructor registration
      parameters:
        - name: registrationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Approved
        '403':
          $ref: '#/components/responses/Forbidden'

  /instructor-registrations/{registrationId}/reject:
    post:
      tags: [Instructors]
      summary: Reject instructor registration
      parameters:
        - name: registrationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Rejected
        '403':
          $ref: '#/components/responses/Forbidden'

  /me/instructor-profile:
    post:
      tags: [Instructors]
      summary: Create instructor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstructorProfileCreateRequest'
      responses:
        '201':
          description: Profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructorProfile'

    patch:
      tags: [Instructors]
      summary: Update instructor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstructorProfileUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructorProfile'

  /instructors/{instructorProfileId}:
    get:
      tags: [Instructors]
      security: []
      summary: Get instructor profile
      parameters:
        - name: instructorProfileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Instructor profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructorProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /instructors/{instructorProfileId}/reviews/summary:
    get:
      tags: [Reviews]
      security: []
      summary: Get instructor review summary
      parameters:
        - name: instructorProfileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Review summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructorReviewSummaryResponse'
# =========================
# 3) Tours + Content + Assets(Tour images) + Favorites
# Paste under: paths:
# =========================

  /organizations/{orgId}/tours:
    get:
      tags: [Tours]
      summary: List tours for org (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/orgId'
        - $ref: '#/components/parameters/tourStatus'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TourListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    post:
      tags: [Tours]
      summary: Create tour (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/orgId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TourCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tour' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /tours:
    get:
      tags: [Tours]
      security: []
      summary: Public tour list (published only)
      parameters:
        - $ref: '#/components/parameters/categoryId'
        - $ref: '#/components/parameters/formatId'
        - $ref: '#/components/parameters/locationText'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicTourListResponse' }

  /tours/{tourId}:
    get:
      tags: [Tours]
      security: []
      summary: Get tour detail (public if published; operator if same org)
      parameters:
        - $ref: '#/components/parameters/tourId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TourDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

    patch:
      tags: [Tours]
      summary: Update tour (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/tourId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TourPatchRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tour' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /tours/{tourId}/publish:
    post:
      tags: [Tours]
      summary: Publish tour (DRAFT -> PUBLISHED) (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/tourId'
      responses:
        '200':
          description: Published
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tour' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /tours/{tourId}/archive:
    post:
      tags: [Tours]
      summary: Archive tour (PUBLISHED -> ARCHIVED) (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/tourId'
      responses:
        '200':
          description: Archived
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tour' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /tours/{tourId}/instructors:
    get:
      tags: [Tours]
      security: []
      summary: Get tour instructors (public)
      parameters:
        - $ref: '#/components/parameters/tourId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstructorPublicProfileList' }

    put:
      tags: [Tours]
      summary: Set tour instructors (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/tourId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TourInstructorSetRequest' }
      responses:
        '204': { description: Updated }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /tours/{tourId}/content:
    get:
      tags: [Tours]
      security: []
      summary: Get tour rich content (public if published; operator if same org)
      parameters:
        - $ref: '#/components/parameters/tourId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TourContentResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      tags: [Tours]
      summary: Upsert tour rich content (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/tourId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TourContentUpsertRequest' }
      responses:
        '200':
          description: Upserted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TourContentResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /tours/{tourId}/assets:
    post:
      tags: [Assets]
      summary: Attach asset to tour (ORG_ADMIN/ORG_OWNER)
      description: |
        Use assets/upload-url + assets/complete first, then attach the asset here.
        Asset type: COVER or GALLERY.
      parameters:
        - $ref: '#/components/parameters/tourId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TourAssetCreateRequest' }
      responses:
        '201':
          description: Attached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TourAsset' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /tours/{tourId}/assets/reorder:
    patch:
      tags: [Assets]
      summary: Reorder tour assets (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/tourId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TourAssetReorderRequest' }
      responses:
        '204': { description: Reordered }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /tours/{tourId}/assets/{tourAssetId}:
    delete:
      tags: [Assets]
      summary: Remove asset from tour (ORG_ADMIN/ORG_OWNER)
      parameters:
        - $ref: '#/components/parameters/tourId'
        - $ref: '#/components/parameters/tourAssetId'
