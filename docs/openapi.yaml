  /occurrences/{occurrenceId}/bookings:
    post:
      tags: [Bookings]
      summary: Create booking request
      description: |
        Booking flow:
        - if seats available → REQUESTED
        - if full → WAITLISTED
      parameters:
        - $ref: '#/components/parameters/occurrenceId'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '409':
          description: Conflict (state/idempotency in progress)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                idempotencyInProgress:
                  $ref: '#/components/examples/IdempotencyInProgressConflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Unprocessable Entity (validation error)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                idempotencyKeyReusedDifferentPayload:
                  $ref: '#/components/examples/IdempotencyKeyReusedDifferentPayload'

