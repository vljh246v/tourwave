name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - 'docs/tasks/**'
      - 'docs/exec-plans/**'
  pull_request:
    paths-ignore:
      - 'docs/tasks/**'
      - 'docs/exec-plans/**'

jobs:
  validate-required-env:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        profile: [alpha, beta, real]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required environment variables (${{ matrix.profile }})
        env:
          ALPHA_DB_URL: ${{ secrets.ALPHA_DB_URL }}
          ALPHA_DB_USERNAME: ${{ secrets.ALPHA_DB_USERNAME }}
          ALPHA_DB_PASSWORD: ${{ secrets.ALPHA_DB_PASSWORD }}
          ALPHA_PAYMENT_BASE_URL: ${{ secrets.ALPHA_PAYMENT_BASE_URL }}
          ALPHA_PAYMENT_API_KEY: ${{ secrets.ALPHA_PAYMENT_API_KEY }}
          ALPHA_NOTIFICATION_BASE_URL: ${{ secrets.ALPHA_NOTIFICATION_BASE_URL }}
          ALPHA_NOTIFICATION_API_KEY: ${{ secrets.ALPHA_NOTIFICATION_API_KEY }}
          ALPHA_ASSET_BASE_URL: ${{ secrets.ALPHA_ASSET_BASE_URL }}
          ALPHA_ASSET_ACCESS_TOKEN: ${{ secrets.ALPHA_ASSET_ACCESS_TOKEN }}
          BETA_DB_URL: ${{ secrets.BETA_DB_URL }}
          BETA_DB_USERNAME: ${{ secrets.BETA_DB_USERNAME }}
          BETA_DB_PASSWORD: ${{ secrets.BETA_DB_PASSWORD }}
          BETA_PAYMENT_BASE_URL: ${{ secrets.BETA_PAYMENT_BASE_URL }}
          BETA_PAYMENT_API_KEY: ${{ secrets.BETA_PAYMENT_API_KEY }}
          BETA_NOTIFICATION_BASE_URL: ${{ secrets.BETA_NOTIFICATION_BASE_URL }}
          BETA_NOTIFICATION_API_KEY: ${{ secrets.BETA_NOTIFICATION_API_KEY }}
          BETA_ASSET_BASE_URL: ${{ secrets.BETA_ASSET_BASE_URL }}
          BETA_ASSET_ACCESS_TOKEN: ${{ secrets.BETA_ASSET_ACCESS_TOKEN }}
          REAL_DB_URL: ${{ secrets.REAL_DB_URL }}
          REAL_DB_USERNAME: ${{ secrets.REAL_DB_USERNAME }}
          REAL_DB_PASSWORD: ${{ secrets.REAL_DB_PASSWORD }}
          REAL_PAYMENT_BASE_URL: ${{ secrets.REAL_PAYMENT_BASE_URL }}
          REAL_PAYMENT_API_KEY: ${{ secrets.REAL_PAYMENT_API_KEY }}
          REAL_NOTIFICATION_BASE_URL: ${{ secrets.REAL_NOTIFICATION_BASE_URL }}
          REAL_NOTIFICATION_API_KEY: ${{ secrets.REAL_NOTIFICATION_API_KEY }}
          REAL_ASSET_BASE_URL: ${{ secrets.REAL_ASSET_BASE_URL }}
          REAL_ASSET_ACCESS_TOKEN: ${{ secrets.REAL_ASSET_ACCESS_TOKEN }}
        run: ./scripts/check-required-env.sh "${{ matrix.profile }}"

  build-and-test:
    runs-on: ubuntu-latest
    needs: validate-required-env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify OpenAPI contract
        run: ./gradlew test --tests 'com.demo.tourwave.agent.OpenApiContractVerificationTest'

      - name: Run real MySQL container smoke
        run: ./gradlew test --tests 'com.demo.tourwave.adapter.out.persistence.jpa.RealMysqlContainerSmokeTest'

      - name: Run real MySQL container regression
        run: ./gradlew test --tests 'com.demo.tourwave.adapter.out.persistence.jpa.RealMysqlContainerRegressionTest'

      - name: Build and test
        run: ./gradlew test
