spring:
  config:
    activate:
      on-profile: beta
  datasource:
    url: ${BETA_DB_URL}
    username: ${BETA_DB_USERNAME}
    password: ${BETA_DB_PASSWORD}

tourwave:
  environment: beta
  runtime-mode: pre-production
  app:
    base-url: ${BETA_APP_BASE_URL}

integration:
  payment:
    base-url: ${BETA_PAYMENT_BASE_URL}
    api-key: ${BETA_PAYMENT_API_KEY}
  notification:
    base-url: ${BETA_NOTIFICATION_BASE_URL}
    api-key: ${BETA_NOTIFICATION_API_KEY}
    sender-email: ${BETA_NOTIFICATION_SENDER_EMAIL}
    sender-name: ${BETA_NOTIFICATION_SENDER_NAME:Tourwave}
  asset:
    base-url: ${BETA_ASSET_BASE_URL}
    public-base-url: ${BETA_ASSET_PUBLIC_BASE_URL}
    bucket: ${BETA_ASSET_BUCKET}
    access-key: ${BETA_ASSET_ACCESS_KEY}
    secret-key: ${BETA_ASSET_SECRET_KEY}
    presign-ttl-seconds: ${BETA_ASSET_PRESIGN_TTL_SECONDS:900}
