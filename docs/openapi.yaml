          schema: { $ref: '#/components/schemas/ErrorResponse' }

    Unprocessable:
      description: Unprocessable Entity (validation error)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  examples:
    OfferExpiredConflict:
      summary: Offer expired after deadline
      value:
        error:
          code: OFFER_EXPIRED
          message: Offer is already expired
          details:
            bookingId: 12001
            offerExpiresAtUtc: '2026-03-06T14:00:00Z'

    OfferNotActiveConflict:
      summary: Booking is not in OFFERED state
      value:
        error:
          code: OFFER_NOT_ACTIVE
          message: Offer action is allowed only when booking is OFFERED
          details:
            bookingId: 12001
            currentStatus: CONFIRMED

    CapacityExceededConflict:
      summary: Seats no longer available
      value:
        error:
          code: CAPACITY_EXCEEDED
          message: Available seats are insufficient
          details:
            occurrenceId: 3301
            requestedSeats: 3
            availableSeats: 1

    InvalidStateTransitionConflict:
      summary: Invalid booking state transition
      value:
        error:
          code: INVALID_STATE_TRANSITION
          message: Transition is not allowed from current state
          details:
            bookingId: 12001
            from: CANCELED
            to: CONFIRMED

    BookingTerminalStateConflict:
      summary: Booking is already terminal
      value:
        error:
          code: BOOKING_TERMINAL_STATE
          message: Booking is in terminal state
          details:
            bookingId: 12001
            status: CANCELED

    PartySizeIncreaseNotAllowed:
      summary: Party size increase rejected
      value:
        error:
          code: PARTY_SIZE_INCREASE_NOT_ALLOWED
          message: partySize can only be decreased
          details:
            bookingId: 12001
            currentPartySize: 2
            requestedPartySize: 3

    BookingScopeMismatch:
      summary: bookingId does not belong to occurrence scope
      value:
        error:
          code: BOOKING_SCOPE_MISMATCH
          message: bookingId does not match occurrence or organization scope
          details:
            occurrenceId: 3301
            bookingId: 12001

    RequiredFieldMissingBookingId:
      summary: bookingId missing in inquiry create payload
      value:
        error:
          code: REQUIRED_FIELD_MISSING
          message: bookingId is required
          details:
            field: bookingId

    RequiredFieldMissingInquiryMessageBody:
      summary: body missing in inquiry message payload
      value:
        error:
          code: REQUIRED_FIELD_MISSING
          message: body is required
          details:
            field: body

    IdempotencyKeyReusedDifferentPayload:
      summary: Same idempotency key, different payload
      value:
        error:
          code: IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_PAYLOAD
          message: Idempotency key cannot be reused with different payload
          details:
            idempotencyKey: 0f5f40d8-4c89-4c8e-a7f3-1b3919a4f9d7

    IdempotencyInProgressConflict:
      summary: Duplicate request still processing
      value:
        error:
          code: IDEMPOTENCY_IN_PROGRESS
          message: Same idempotency key request is in progress
          details:
            retryAfterSeconds: 3
  parameters:
    # ---- Common paging ----
    cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string, nullable: true }
      description: Opaque cursor for pagination

    limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      description: Page size

    idempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: Client-provided deduplication key for mutation safety

    # ---- IDs (path) ----
    orgId:
      name: orgId
      in: path
      required: true
      schema: { type: integer, format: int64 }

    userId:
      name: userId
      in: path
      required: true
