    post:
      tags: [Occurrences]
      summary: Mark occurrence finished (ORG_ADMIN/ORG_OWNER)
      description: Marks occurrence FINISHED (used for enabling reviews and closing ops)
      parameters:
        - $ref: '#/components/parameters/occurrenceId'
        - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '204': { description: Finished }
