spring:
  application:
    name: tourwave
  profiles:
    default: local
  jpa:
    open-in-view: false

tourwave:
  idempotency:
    ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:86400}
  auth:
    jwt-secret: ${TOURWAVE_JWT_SECRET:tourwave-dev-secret-key-change-me}
    access-token-ttl-seconds: ${TOURWAVE_ACCESS_TOKEN_TTL_SECONDS:3600}
    refresh-token-ttl-seconds: ${TOURWAVE_REFRESH_TOKEN_TTL_SECONDS:1209600}
    allow-header-auth-fallback: ${TOURWAVE_ALLOW_HEADER_AUTH_FALLBACK:true}
  payment:
    webhook-secret: ${TOURWAVE_PAYMENT_WEBHOOK_SECRET:tourwave-webhook-secret}
    refund:
      max-retry-attempts: ${TOURWAVE_PAYMENT_MAX_RETRY_ATTEMPTS:5}
      retry-cooldown-seconds: ${TOURWAVE_PAYMENT_RETRY_COOLDOWN_SECONDS:600}
