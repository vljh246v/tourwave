      tags: [Occurrences]
      summary: Cancel occurrence (ORG_ADMIN/ORG_OWNER)
      description: |
        When occurrence becomes CANCELED:
        - all bookings become CANCELED
        - full refund (virtual) applies
      parameters:
        - $ref: '#/components/parameters/occurrenceId'
        - $ref: '#/components/parameters/idempotencyKey'
      responses:
        '204': { description: Canceled }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict (state/idempotency)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                idempotencyInProgress:
                  $ref: '#/components/examples/IdempotencyInProgressConflict'
        '422':
          description: Unprocessable Entity (idempotency key mismatch)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                idempotencyKeyReusedDifferentPayload:
                  $ref: '#/components/examples/IdempotencyKeyReusedDifferentPayload'

