spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${MYSQL_DB_URL:jdbc:mysql://localhost:3306/tourwave}
    username: ${MYSQL_DB_USERNAME:tourwave}
    password: ${MYSQL_DB_PASSWORD:tourwave}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        format_sql: false

