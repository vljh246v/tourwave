      in: query
      required: false
      schema: { type: string, format: date-time }
      description: Inclusive start in UTC

    dateToOptional:
      name: dateTo
      in: query
      required: false
      schema: { type: string, format: date-time }
      description: Exclusive end in UTC

    timezone:
      name: timezone
      in: query
      required: false
      schema: { type: string, example: Asia/Seoul }
      description: IANA timezone for client display/hints

    # ---- Filters ----
    locationText:
      name: location
      in: query
      required: false
      schema: { type: string, maxLength: 200 }
      description: Location free text (MVP)

    categoryId:
      name: categoryId
      in: query
      required: false
      schema: { type: integer, format: int64 }
      description: Activity category id (e.g., scuba, skydiving)

    formatId:
      name: formatId
      in: query
      required: false
      schema: { type: integer, format: int64 }
      description: Activity format id (e.g., lesson, tour)

    priceMin:
      name: priceMin
      in: query
      required: false
      schema: { type: integer, minimum: 0 }
      description: Minimum price (minor currency unit, e.g., KRW)

    priceMax:
      name: priceMax
      in: query
      required: false
      schema: { type: integer, minimum: 0 }
      description: Maximum price (minor currency unit)

    onlyAvailable:
      name: onlyAvailable
      in: query
      required: false
      schema: { type: boolean, default: false }
      description: Only include occurrences with seats for the given partySize (or 1)

    includeRating:
      name: includeRating
      in: query
      required: false
      schema: { type: boolean, default: true }
      description: Include rating summary in search results

    sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        enum: [START_AT_ASC, PRICE_ASC, PRICE_DESC, RATING_DESC]
        default: START_AT_ASC

    # ---- Party size ----
    partySize:
      name: partySize
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 50, default: 1 }

    partySizeRequired:
      name: partySize
      in: query
      required: true
      schema: { type: integer, minimum: 1, maximum: 50 }

    # ---- Status filters ----
    bookingStatus:
      name: bookingStatus
      in: query
      required: false
      schema:
        type: string
        enum:
          - REQUESTED
          - WAITLISTED
          - OFFERED
          - CONFIRMED
          - REJECTED
          - CANCELED
          - EXPIRED
          - COMPLETED

    inquiryStatus:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [OPEN, CLOSED]

    tourStatus:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [DRAFT, PUBLISHED, ARCHIVED]

    reviewType:
      name: type
      in: query
      required: false
      schema:
        type: string
        enum: [TOUR, INSTRUCTOR]

    reviewVisibility:
      name: visibility
      in: query
      required: false
      schema:
        type: string
        enum: [PRIVATE]  # content is private in MVP

    # ---- Notifications ----
    onlyUnread:
      name: onlyUnread
      in: query
      required: false
      schema: { type: boolean, default: false }
